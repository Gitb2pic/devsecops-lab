# Important : le parseur INI d'Ansible ne supporte PAS les commentaires en fin
# de ligne. Tout commentaire doit être sur sa propre ligne (# ou ;).

[defaults]
inventory = inventory.ini
roles_path = roles
# host_key_checking : False pour le lab uniquement ; repasser à True en prod.
host_key_checking = False
remote_user = deploy
interpreter_python = auto_silent
# Remplace l'ancien (déprécié) stdout_callback = yaml.
callback_result_format = yaml

[privilege_escalation]
become = True
become_method = sudo
