name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_test_pwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_DB: app
      POSTGRES_USER: b2pic
      POSTGRES_PASSWORD: app_test_pwd

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt ruff

      - name: Linter (ruff)
        working-directory: app
        run: ruff check .

      - name: Tests (pytest)
        working-directory: app
        run: pytest -v

  build-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Construire l'image Docker de l'app
        run: docker build -t devsecops-lab-app:ci ./app

      - name: Exporter l'image dans un fichier
        run: docker save devsecops-lab-app:ci -o image.tar

      - name: Scan de vulnérabilités (Trivy)
        run: |
          docker run --rm -v "$PWD:/work" aquasec/trivy:0.71.1 image \
            --input /work/image.tar \
            --severity HIGH,CRITICAL \
            --no-progress \
            --exit-code 0
