# docker-compose.yml — la stack applicative et sa segmentation reseau.
# Lancement : docker compose up -d --build   (depuis le dossier deploy/)

services:

  # ===========================================================================
  # 1) REVERSE PROXY (Traefik) — le SEUL service exposé au monde extérieur
  # ===========================================================================
  traefik:
    # v3.6.1+ : négocie automatiquement la version de l'API Docker.
    # Les versions <= v3.3 utilisent l'API 1.24, supprimée par Docker récent.
    image: traefik:v3.6.1
    command:
      # Provider Docker : Traefik lit les "labels" des conteneurs pour router.
      - "--providers.docker=true"
      # Ne route QUE les conteneurs qui le demandent (traefik.enable=true).
      - "--providers.docker.exposedbydefault=false"
      # Point d'entrée HTTP sur le port 80.
      - "--entrypoints.web.address=:80"
    ports:
      # HÔTE:CONTENEUR. Publie le port 80 de la VM vers Traefik.
      # C'est l'UNIQUE porte ouverte vers l'extérieur de toute la stack.
      - "80:80"
    volumes:
      # Traefik lit l'API Docker pour découvrir les conteneurs. En ro = lecture
      # seule. (Voir la note sécurité : ce montage est sensible, on le durcira.)
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - edge
    restart: unless-stopped

  # ===========================================================================
  # 2) APPLICATION — sur DEUX réseaux : edge (reçoit le proxy) + backend
  #    (atteint la base). AUCUN port publié : injoignable en direct de dehors.
  # ===========================================================================
  app:
    build: ../app                  # construit l'image depuis notre Dockerfile
    environment:
      POSTGRES_HOST: db            # 'db' résolu par le DNS Docker (service ci-dessous)
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    labels:
      - "traefik.enable=true"                                            # activer le routage
      # L'app est sur 2 réseaux : on dit à Traefik lequel utiliser pour la joindre.
      - "traefik.docker.network=deploy_edge"                             # sinon -> Gateway Timeout
      - "traefik.http.routers.app.rule=PathPrefix(`/`)"                  # router tout le trafic vers l'app
      - "traefik.http.routers.app.entrypoints=web"                       # via le point d'entrée HTTP
      - "traefik.http.services.app.loadbalancer.server.port=8000"        # port interne ciblé (uvicorn)
    networks:
      - edge
      - backend
    depends_on:
      db:
        condition: service_healthy  # démarre seulement quand la base est prête
    restart: unless-stopped

  # ===========================================================================
  # 3) BASE DE DONNÉES — UNIQUEMENT sur backend (réseau internal: true).
  #    Aucun port publié, aucune route Internet : invisible de l'extérieur.
  # ===========================================================================
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data    # volume nommé = données persistantes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  # ===========================================================================
  # MONITORING — Prometheus collecte, Grafana affiche, 2 exporters fournissent.
  # Tout sur le réseau "monitoring" (interne). Grafana sort via "edge".
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Grafana servi sous le sous-chemin /grafana (derrière le reverse proxy).
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafanadata:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=deploy_edge"
      - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - edge          # pour être joint par Traefik
      - monitoring    # pour interroger Prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
    restart: unless-stopped

# =============================================================================
# RÉSEAUX — le cœur de la segmentation
# =============================================================================
networks:
  edge:
    driver: bridge        # réseau "public" : possède une passerelle vers l'extérieur
  backend:
    driver: bridge
    internal: true        # AUCUNE passerelle, AUCUNE route Internet : isole la base
  monitoring:
    driver: bridge
    internal: true        # exporters + Prometheus isolés ; Grafana sort via edge

# =============================================================================
# VOLUMES — stockage persistant
# =============================================================================
volumes:
  pgdata:
  promdata:               # base de métriques de Prometheus
  grafanadata:            # dashboards et config Grafana
